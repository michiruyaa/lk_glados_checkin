name: Yamibo Sign In

on:
  schedule:
    # 北京时间每天 08:00 (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  yamibo-sign-in:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r sign_script/requirements.txt
          pip install pyyaml requests

      # ========== Mihomo 代理设置 ==========
      - name: Setup Mihomo Proxy
        env:
          SUBSCRIBE_URL: ${{ secrets.SUBSCRIBE_URL }}
        run: |
          # 检查是否有订阅链接
          if [ -z "$SUBSCRIBE_URL" ]; then
            echo "未设置 SUBSCRIBE_URL，跳过 Mihomo 设置"
            exit 0
          fi
          
          echo "=== 下载 Mihomo 内核 ==="
          # 获取最新版本号
          MIHOMO_VERSION=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          echo "Mihomo 版本: $MIHOMO_VERSION"
          
          # 下载 Mihomo
          curl -L -o mihomo.gz "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VERSION}/mihomo-linux-amd64-${MIHOMO_VERSION}.gz"
          gunzip mihomo.gz
          chmod +x mihomo
          
          echo "=== 生成 Mihomo 配置 ==="
          python sign_script/setup_mihomo.py
          
          echo "=== 启动 Mihomo ==="
          ./mihomo -f mihomo_config.yaml &
          
          echo "等待 Mihomo 启动并测试连接..."
          sleep 10
          
          # 测试代理是否可用
          echo "测试代理连接..."
          curl -x http://127.0.0.1:7890 -s --max-time 10 http://www.google.com/generate_204 || echo "代理测试完成"

      # ========== 运行签到脚本 ==========
      - name: Run Yamibo sign in
        env:
          YAMIBO_COOKIE: ${{ secrets.YAMIBO_COOKIE }}
          SUBSCRIBE_URL: ${{ secrets.SUBSCRIBE_URL }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          # 设置代理环境变量
          if [ -n "$PROXY_URL" ]; then
            echo "使用直接代理: ${PROXY_URL//:*@/:***@}"
            export HTTP_PROXY="$PROXY_URL"
            export HTTPS_PROXY="$PROXY_URL"
          elif [ -n "$SUBSCRIBE_URL" ]; then
            echo "使用 Mihomo 代理: http://127.0.0.1:7890"
            export HTTP_PROXY="http://127.0.0.1:7890"
            export HTTPS_PROXY="http://127.0.0.1:7890"
            export ALL_PROXY="socks5://127.0.0.1:7891"
          else
            echo "不使用代理"
          fi
          
          python sign_script/yamibo_sign.py

      # ========== 清理 ==========
      - name: Cleanup
        if: always()
        run: |
          # 停止 Mihomo
          pkill -f mihomo || true
          # 删除配置文件（包含敏感信息）
          rm -f mihomo_config.yaml || true
